{% extends "base.html" %}
{% block content %}
<div class="onboarding">
  <div class="wizard-progress"><div class="wizard-progress-fill" style="width:{{ (step/total*100)|round }}%"></div></div>
  <p class="hint">{{ t('step') }} {{ step }} / {{ total }}</p>
  <h1>{{ t('onboarding_diet_title') }}</h1>
  <form method="post" class="card">
    <label>{{ t('dietary_preferences') }}</label>
    <div class="chip-group">
      {% for pref in ["vegetarian","vegan","lactose_free","gluten_free","halal","kosher","none"] %}
        <label class="chip"><input type="checkbox" name="dietary_prefs" value="{{ pref }}" {{ 'checked' if pref in (profile.dietary_prefs or []) }}> {{ pref.replace('_',' ') }}</label>
      {% endfor %}
    </div>
    <label>{{ t('allergies') }} <input type="text" name="allergies" placeholder="{{ t('comma_separated') }}" value="{{ (profile.allergies or [])|join(', ') }}"></label>
    <label>{{ t('dislikes') }} <input type="text" name="dislikes" placeholder="{{ t('comma_separated') }}" value="{{ (profile.dislikes or [])|join(', ') }}"></label>
    <label>{{ t('meal_frequency') }} <input type="number" name="meal_frequency" min="2" max="8" value="{{ profile.meal_frequency }}"></label>
    <button class="btn" type="submit">{{ t('continue') }}</button>
  </form>
</div>
{% endblock %}
