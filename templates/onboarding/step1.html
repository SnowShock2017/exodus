{% extends "base.html" %}
{% block content %}
<div class="onboarding">
  <div class="wizard-progress"><div class="wizard-progress-fill" style="width:{{ (step/total*100)|round }}%"></div></div>
  <p class="hint">{{ t('step') }} {{ step }} / {{ total }}</p>
  <h1>{{ t('onboarding_basics_title') }}</h1>
  <form method="post" class="card">
    <label>{{ t('name_nickname') }} <input type="text" name="name" value="{{ profile.name or '' }}" required></label>
    <label>{{ t('age') }} <input type="number" name="age" value="{{ profile.age }}" required></label>
    <label>{{ t('sex') }}
      <select name="sex">
        <option value="male" {{ 'selected' if profile.sex=='male' }}>{{ t('male') }}</option>
        <option value="female" {{ 'selected' if profile.sex=='female' }}>{{ t('female') }}</option>
        <option value="unspecified" {{ 'selected' if profile.sex=='unspecified' }}>{{ t('prefer_not_say') }}</option>
      </select>
    </label>
    <label>{{ t('height') }} <input type="number" step="0.1" name="height_cm" value="{{ profile.height_cm }}" required></label>
    <label>{{ t('weight') }} <input type="number" step="0.1" name="weight_kg" value="{{ profile.weight_kg }}" required></label>
    <label>{{ t('target_weight') }} <input type="number" step="0.1" name="target_weight_kg" value="{{ profile.target_weight_kg or '' }}"></label>
    <label>{{ t('language') }}
      <select name="language">
        <option value="en" {{ 'selected' if profile.language=='en' }}>English</option>
        <option value="ro" {{ 'selected' if profile.language=='ro' }}>Română</option>
      </select>
    </label>
    <label>{{ t('units') }}
      <select name="units">
        <option value="kg" {{ 'selected' if profile.units=='kg' }}>kg</option>
        <option value="lb" {{ 'selected' if profile.units=='lb' }}>lb</option>
      </select>
    </label>
    <button class="btn" type="submit">{{ t('continue') }}</button>
  </form>
</div>
{% endblock %}
