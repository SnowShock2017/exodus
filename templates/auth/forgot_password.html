{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <h1>{{ t('forgot_password') }}</h1>
  <form method="post" class="card">
    <label>{{ t('email') }} <input type="email" name="email" required autofocus></label>
    <button class="btn" type="submit">{{ t('send_reset_link') }}</button>
  </form>
  {% if reset_link %}
    <div class="card">
      <p class="hint">{{ t('smtp_not_configured_hint') }}</p>
      <p><a href="{{ reset_link }}">{{ reset_link }}</a></p>
    </div>
  {% endif %}
  <p class="auth-links"><a href="{{ url_for('auth.login') }}">{{ t('back_to_login') }}</a></p>
</div>
{% endblock %}
