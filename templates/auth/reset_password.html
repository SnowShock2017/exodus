{% extends "base.html" %}
{% block content %}
<div class="auth-card">
  <h1>{{ t('reset_password') }}</h1>
  <form method="post" class="card">
    <label>{{ t('new_password') }} <input type="password" name="password" required minlength="8"></label>
    <label>{{ t('confirm_password') }} <input type="password" name="confirm_password" required minlength="8"></label>
    <button class="btn" type="submit">{{ t('save') }}</button>
  </form>
</div>
{% endblock %}
