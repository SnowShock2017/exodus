{% extends "base.html" %}
{% block content %}
<h1>{{ t('settings_title') }}</h1>

<form method="post" action="{{ url_for('save_settings') }}" class="card">
  <label>{{ t('language') }}
    <select name="language">
      <option value="en" {{ 'selected' if profile.language == 'en' else '' }}>English</option>
      <option value="ro" {{ 'selected' if profile.language == 'ro' else '' }}>Română</option>
    </select>
  </label>

  <label>{{ t('goal') }}
    <select name="goal">
      <option value="lean_maintain_strength" {{ 'selected' if profile.goal == 'lean_maintain_strength' else '' }}>Lean out, keep strength</option>
      <option value="lean_aggressive" {{ 'selected' if profile.goal == 'lean_aggressive' else '' }}>Lean out, faster</option>
      <option value="recomp" {{ 'selected' if profile.goal == 'recomp' else '' }}>Recomposition</option>
      <option value="bulk" {{ 'selected' if profile.goal == 'bulk' else '' }}>Bulk</option>
    </select>
  </label>

  <label>{{ t('height') }} <input type="number" step="0.1" name="height_cm" value="{{ profile.height_cm }}"></label>
  <label>{{ t('weight') }} <input type="number" step="0.1" name="weight_kg" value="{{ profile.weight_kg }}"></label>
  <label>Age <input type="number" name="age" value="{{ profile.age }}"></label>
  <label>Activity level
    <select name="activity_level">
      <option value="sedentary" {{ 'selected' if profile.activity_level == 'sedentary' else '' }}>Sedentary</option>
      <option value="moderate" {{ 'selected' if profile.activity_level == 'moderate' else '' }}>Moderate (3-5 sessions/wk)</option>
      <option value="high" {{ 'selected' if profile.activity_level == 'high' else '' }}>High (hard training + active job)</option>
    </select>
  </label>
  <label>{{ t('training_days') }} <input type="number" name="training_days_per_week" value="{{ profile.training_days_per_week }}"></label>

  <h3>{{ t('prs') }}</h3>
  <label>Bench <input type="number" step="0.5" name="pr_bench" value="{{ profile.prs_kg.bench }}"></label>
  <label>Deadlift <input type="number" step="0.5" name="pr_deadlift" value="{{ profile.prs_kg.deadlift }}"></label>
  <label>Squat <input type="number" step="0.5" name="pr_squat" value="{{ profile.prs_kg.squat }}"></label>
  <label>Pull-ups (clean reps) <input type="number" name="pr_pullups" value="{{ profile.prs_kg.pullups_clean_reps }}"></label>

  <button class="btn" type="submit">{{ t('save') }}</button>
</form>
{% endblock %}
